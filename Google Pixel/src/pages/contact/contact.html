<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Pixel</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/flowbite@1.6.5/dist/flowbite.min.js"></script>
</head>

<body class="bg-gray-200">

    <!-- Navbar -->
    <nav class="bg-black text-white shadow p-5 flex justify-between items-center ">
        <h1 class="text-2xl font-bold">Google Pixel</h1>

        <ul class="flex gap-6">
            <li><a href="../../../index.html"
                    class="hover:text-black hover:bg-white px-3 py-2 hover:rounded-2xl transition duration-300">Home</a>
            </li>
            <li><a href="../about/about.html"
                    class="hover:text-black hover:bg-white px-3 py-2 hover:rounded-2xl transition duration-300">About</a>
            </li>
            <li><a href="../contact/contact.html"
                    class="hover:text-black hover:bg-white px-3 py-2 hover:rounded-2xl transition duration-300">Contact</a>
            </li>
            <li><a href="../signin/signin.html"
                    class="hover:text-black hover:bg-white px-3 py-2 hover:rounded-2xl transition duration-300">Sign
                    In</a>
            </li>
            <li><a href="../signup/signup.html"
                    class="hover:text-black hover:bg-white px-3 py-2 hover:rounded-2xl transition duration-300">Sign
                    Up</a>
            </li>
        </ul>
        <button id="themeToggleBtn" onclick="toggleTheme()"
            class="ml-4 border border-gray-500 text-white text-xs font-mono px-3 py-1.5 rounded hover:border-blue-400 hover:text-blue-400 transition">
            🌙 Dark
        </button>
    </nav>

    <!-- Contact Section -->
    <section class="flex justify-center items-center min-h-screen p-6">

        <form action="https://formspree.io/f/meernjjd" method="POST"
            class="bg-white shadow-lg rounded-lg p-8 w-full max-w-lg space-y-4">

            <h2 class="text-2xl font-bold text-center mb-4">Contact Us</h2>

            <!-- Name -->
            <div>
                <label class="block mb-1 font-medium">Your Name</label>
                <input type="text" name="name" required class="w-full border p-2 rounded focus:ring-2 focus:ring-black">
            </div>

            <!-- Email -->
            <div>
                <label class="block mb-1 font-medium">Your Email</label>
                <input type="email" name="email" required
                    class="w-full border p-2 rounded focus:ring-2 focus:ring-black">
            </div>

            <!-- Message -->
            <div>
                <label class="block mb-1 font-medium">Message</label>
                <textarea name="message" required
                    class="w-full border p-2 rounded focus:ring-2 focus:ring-black"></textarea>
            </div>

            <!-- Checkbox -->
            <div class="flex items-center">
                <input type="checkbox" required class="w-4 h-4 text-black border-gray-300 rounded">
                <label class="ml-2 text-sm">Agree to terms</label>
            </div>

            <!-- Button -->
            <button type="submit" class="w-full bg-black text-white py-2 rounded hover:bg-gray-700 transition">
                Send Message
            </button>

        </form>

    </section>

    <script>
        const applyTheme = (t) => {
            document.body.style.background = t==='dark' ? '#111827' : '';
            const btn = document.getElementById('themeToggleBtn');
            if(btn) btn.textContent = t==='dark' ? '☀️ Light' : '🌙 Dark';
        };
        const toggleTheme = () => {
            const cur = localStorage.getItem('theme')||'dark';
            const next = cur==='dark'?'light':'dark';
            localStorage.setItem('theme', next);
            applyTheme(next);
        };
        applyTheme(localStorage.getItem('theme')||'dark');
    </script>
</body>
</html>
