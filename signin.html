<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Sign In</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/flowbite@1.6.5/dist/flowbite.min.js"></script>

</head>

<body class="bg-gray-100">

    <!-- Navbar -->
    <nav class="bg-black text-white shadow p-5 flex justify-between items-center">

        <h1 class="text-2xl font-bold">Google Pixel</h1>

        <ul class="flex gap-6">
            <li><a href="../../../index.html"
                    class="hover:text-black hover:bg-white px-3 py-2 hover:rounded-2xl transition duration-300">Home</a>
            </li>
            <li><a href="../about/about.html"
                    class="hover:text-black hover:bg-white px-3 py-2 hover:rounded-2xl transition duration-300">About</a>
            </li>
            <li><a href="../contact/contact.html"
                    class="hover:text-black hover:bg-white px-3 py-2 hover:rounded-2xl transition duration-300">Contact</a>
            </li>
            <li><a href="../signin/signin.html"
                    class="hover:text-black hover:bg-white px-3 py-2 hover:rounded-2xl transition duration-300">Sign
                    In</a></li>
            <li><a href="../signup/signup.html"
                    class="hover:text-black hover:bg-white px-3 py-2 hover:rounded-2xl transition duration-300">Sign
                    Up</a></li>
        </ul>
        <button id="themeToggleBtn" onclick="toggleTheme()"
            class="ml-4 border border-gray-500 text-white text-xs font-mono px-3 py-1.5 rounded hover:border-blue-400 hover:text-blue-400 transition">
            🌙 Dark
        </button>
    </nav>

    <!-- Sign In Section -->
    <section class="flex justify-center items-center min-h-screen">

        <form id="loginForm" class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md space-y-4">

            <h2 class="text-3xl font-bold text-center">Sign In</h2>

            <!-- Email -->
            <div>
                <label class="block mb-1 font-medium">Email</label>
                <input type="email" id="email" class="w-full border p-3 rounded focus:ring-2 focus:ring-black">
            </div>

            <!-- Password -->
            <div>
                <label class="block mb-1 font-medium">Password</label>
                <input type="password" id="password" class="w-full border p-3 rounded focus:ring-2 focus:ring-black">
            </div>

            <!-- Checkbox (Flowbite Component 1) -->
            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input type="checkbox" class="w-4 h-4">
                    <label class="ml-2 text-sm">Remember me</label>
                </div>

                <a href="#" class="text-sm text-blue-600 hover:underline">Forgot password?</a>
            </div>

            <!-- Button (Flowbite Component 2) -->
            <button type="submit" class="w-full bg-black text-white py-3 rounded hover:bg-gray-700 transition">
                Login
            </button>

            <!-- Error -->
            <p id="errorMsg" class="text-red-500 text-sm text-center"></p>

            <!-- Link -->
            <p class="text-center text-sm">
                Don't have an account?
                <a href="../signup/signup.html" class="text-blue-600 hover:underline">
                    Sign Up
                </a>
            </p>

        </form>

    </section>

    <script>
        const applyTheme = (t) => {
            document.body.style.background = t==='dark' ? '#111827' : '';
            const btn = document.getElementById('themeToggleBtn');
            if(btn) btn.textContent = t==='dark' ? '☀️ Light' : '🌙 Dark';
        };
        const toggleTheme = () => {
            const cur = localStorage.getItem('theme')||'dark';
            const next = cur==='dark'?'light':'dark';
            localStorage.setItem('theme', next);
            applyTheme(next);
        };
        applyTheme(localStorage.getItem('theme')||'dark');

        const form = document.getElementById("loginForm");
        const errorMsg = document.getElementById("errorMsg");

        form.addEventListener("submit", function (e) {

            let email = document.getElementById("email").value.trim();
            let password = document.getElementById("password").value.trim();

            if (email === "" || password === "") {
                e.preventDefault();
                errorMsg.innerText = "All fields are required!";
                return;
            }

            let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

            if (!email.match(emailPattern)) {
                e.preventDefault();
                errorMsg.innerText = "Enter a valid email!";
                return;
            }

            if (password.length < 6) {
                e.preventDefault();
                errorMsg.innerText = "Password must be at least 6 characters!";
                return;
            }

        });
    </script>

</body>

</html>
