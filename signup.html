<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>

    <script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-200">

    <!-- Navbar -->
    <nav class="bg-black text-white shadow p-5 flex justify-between items-center">

        <h1 class="text-2xl font-bold">Google Pixel</h1>

        <ul class="flex gap-6">
            <li><a href="../../../index.html"
                    class="hover:text-black hover:bg-white px-3 py-2 hover:rounded-2xl transition duration-300">Home</a>
            </li>
            <li><a href="../about/about.html"
                    class="hover:text-black hover:bg-white px-3 py-2 hover:rounded-2xl transition duration-300">About</a>
            </li>
            <li><a href="../contact/contact.html"
                    class="hover:text-black hover:bg-white px-3 py-2 hover:rounded-2xl transition duration-300">Contact</a>
            </li>
            <li><a href="../signin/signin.html"
                    class="hover:text-black hover:bg-white px-3 py-2 hover:rounded-2xl transition duration-300">Sign
                    In</a></li>
            <li><a href="../signup/signup.html"
                    class="hover:text-black hover:bg-white px-3 py-2 hover:rounded-2xl transition duration-300">Sign
                    Up</a></li>
        </ul>
        <button id="themeToggleBtn" onclick="toggleTheme()"
            class="ml-4 border border-gray-500 text-white text-xs font-mono px-3 py-1.5 rounded hover:border-blue-400 hover:text-blue-400 transition">
            🌙 Dark
        </button>
    </nav>

    <!-- Sign Up Section -->
    <section class="flex justify-center items-center min-h-screen">

        <form id="signupForm" class="bg-white shadow-lg p-8 rounded-lg w-full max-w-md space-y-4">

            <h2 class="text-3xl font-bold text-center">Create Account</h2>

            <!-- Name -->
            <div>
                <label class="block mb-1 font-medium">Name</label>
                <input type="text" id="name" class="w-full border p-3 rounded focus:ring-2 focus:ring-black">
            </div>

            <!-- Email -->
            <div>
                <label class="block mb-1 font-medium">Email</label>
                <input type="email" id="email" class="w-full border p-3 rounded focus:ring-2 focus:ring-black">
            </div>

            <!-- Password -->
            <div>
                <label class="block mb-1 font-medium">Password</label>
                <input type="password" id="password" class="w-full border p-3 rounded focus:ring-2 focus:ring-black">
            </div>

            <!-- Confirm Password -->
            <div>
                <label class="block mb-1 font-medium">Confirm Password</label>
                <input type="password" id="confirmPassword"
                    class="w-full border p-3 rounded focus:ring-2 focus:ring-black">
            </div>

            <!-- Checkbox (Component 1) -->
            <div class="flex items-center">
                <input type="checkbox" id="terms" class="w-4 h-4">
                <label class="ml-2 text-sm">Accept Terms & Conditions</label>
            </div>

            <!-- Button (Component 2) -->
            <button type="submit" class="bg-black text-white w-full py-3 rounded hover:bg-gray-700 transition">
                Register
            </button>

            <!-- Error -->
            <p id="errorMsg" class="text-red-500 text-sm text-center"></p>

            <!-- Link -->
            <p class="text-center text-sm">
                Already have an account?
                <a href="../signin/signin.html" class="text-blue-600 hover:underline">
                    Sign In
                </a>
            </p>

        </form>

    </section>

    <script>
        const applyTheme = (t) => {
            document.body.style.background = t==='dark' ? '#111827' : '';
            const btn = document.getElementById('themeToggleBtn');
            if(btn) btn.textContent = t==='dark' ? '☀️ Light' : '🌙 Dark';
        };
        const toggleTheme = () => {
            const cur = localStorage.getItem('theme')||'dark';
            const next = cur==='dark'?'light':'dark';
            localStorage.setItem('theme', next);
            applyTheme(next);
        };
        applyTheme(localStorage.getItem('theme')||'dark');

        const form = document.getElementById("signupForm");
        const errorMsg = document.getElementById("errorMsg");

        form.addEventListener("submit", function (e) {

            let name = document.getElementById("name").value.trim();
            let email = document.getElementById("email").value.trim();
            let password = document.getElementById("password").value.trim();
            let confirmPassword = document.getElementById("confirmPassword").value.trim();
            let terms = document.getElementById("terms").checked;

            if (name === "" || email === "" || password === "" || confirmPassword === "") {
                e.preventDefault();
                errorMsg.innerText = "All fields are required!";
                return;
            }

            let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;

            if (!email.match(emailPattern)) {
                e.preventDefault();
                errorMsg.innerText = "Enter a valid email!";
                return;
            }

            if (password.length < 6) {
                e.preventDefault();
                errorMsg.innerText = "Password must be at least 6 characters!";
                return;
            }

            if (password !== confirmPassword) {
                e.preventDefault();
                errorMsg.innerText = "Passwords do not match!";
                return;
            }

            if (!terms) {
                e.preventDefault();
                errorMsg.innerText = "You must accept terms!";
                return;
            }

        });
    </script>

</body>

</html>
